name: Java CI with Gradle (Minecraft Fabric Mod)

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up JDK 21 (Minecraft 1.21.1+ requires Java 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Step 3: Validate Gradle Wrapper to ensure it hasn't been maliciously modified
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4

    # Step 4: Cache Gradle dependencies and optimize build speeds
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Step 5: Grant execute permission to Gradle wrapper
    - name: Make Gradle Wrapper Executable
      run: chmod +x gradlew

    # Step 6: Build the Minecraft mod (compiles, deobfuscates, remaps, and packages the mod jar)
    - name: Build Mod with Gradle
      run: ./gradlew build

    # Step 7: Archive the compiled mod .jar files so they can be downloaded from the run summary
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ServerManager-Fabric-1.21.1
        path: build/libs/
